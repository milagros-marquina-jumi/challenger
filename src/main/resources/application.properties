spring.application.name=challenger

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/challenger
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection pool settings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=30m

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10

# Rate Limiting se implementa directamente en el controlador

# Actuator
management.endpoints.web.exposure.include=health,info
